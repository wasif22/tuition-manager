<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tuition Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f1;--surface:#fff;--surface2:#f9f9f7;--border:#e2e2de;
  --text:#1a1a18;--sec:#6b6b68;--muted:#a0a09e;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-t:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-t:#15803d;
  --red:#dc2626;--red-bg:#fef2f2;--red-t:#b91c1c;
  --yellow-bg:#fffbeb;--yellow-t:#b45309;
  --r:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* LOCK SCREEN */
.lock-screen{position:fixed;inset:0;background:#f4f4f1;display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem}
.lock-box{background:#fff;border:1px solid #e2e2de;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.lock-icon{font-size:48px;margin-bottom:1rem}
.lock-box h2{font-size:20px;font-weight:700;margin-bottom:6px}
.lock-box p{font-size:14px;color:#6b6b68;margin-bottom:1.5rem}
.lock-box input{text-align:center;font-size:18px;letter-spacing:3px;margin-bottom:12px;border-radius:10px}
.lock-box button{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.lock-box button:hover{background:#1d4ed8}
.lock-error{color:#dc2626;font-size:13px;margin-top:8px;min-height:20px}
.lock-footer{font-size:12px;color:#a0a09e;margin-top:1.5rem}
.hidden{display:none}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px}
.header p{font-size:13px;color:var(--sec);margin-top:2px}
.month-selector{display:flex;align-items:center;gap:8px}
.month-selector select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:500;background:var(--surface);color:var(--text);cursor:pointer}
.month-selector button{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;font-size:16px;line-height:1}

/* NAV TABS */
.tabs{display:flex;gap:0;border-bottom:1.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:9px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--sec);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;text-align:center}
.stat-val{font-size:20px;font-weight:700}
.stat-lbl{font-size:12px;color:var(--sec);margin-top:3px}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--accent)}.o{color:#d97706}

/* FORM BOX */
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem}
.form-title{font-size:12px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.fg{display:grid;gap:8px;align-items:end}
.fg-4{grid-template-columns:1.5fr 1fr 1fr auto}
.fg-3{grid-template-columns:1.5fr 1fr auto}
.field label{display:block;font-size:12px;color:var(--sec);font-weight:500;margin-bottom:4px}
input,select,textarea{width:100%;padding:7px 10px;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn{padding:8px 18px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-blue{background:var(--accent);color:#fff}
.btn-red{background:var(--red-bg);color:var(--red-t);border:1px solid #fca5a5}
.btn-sm{padding:5px 12px;font-size:12px}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
.sec-head h2{font-size:15px;font-weight:700}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-row select,.filter-row input{width:auto;font-size:13px;padding:5px 10px}

/* STUDENT LIST */
.list{display:flex;flex-direction:column;gap:8px}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem 1.25rem;display:grid;grid-template-columns:42px 1fr auto auto auto;gap:12px;align-items:center}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--accent-bg);color:var(--accent-t);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.s-name{font-size:14px;font-weight:600}
.s-meta{font-size:12px;color:var(--sec);margin-top:2px}
.s-fee{font-size:14px;font-weight:600;text-align:right}
.s-fee-lbl{font-size:11px;color:var(--muted);text-align:right}

/* BADGE */
.badge{font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;border:none;white-space:nowrap}
.badge.paid{background:var(--green-bg);color:var(--green-t)}
.badge.unpaid{background:var(--red-bg);color:var(--red-t)}
.badge.partial{background:var(--yellow-bg);color:var(--yellow-t)}

/* FEE ROW */
.fee-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem 1.25rem;display:grid;grid-template-columns:42px 1fr auto auto;gap:12px;align-items:center}
.fee-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.fee-actions button{padding:5px 12px;font-size:12px;font-weight:600;border-radius:20px;border:none;cursor:pointer;transition:opacity .15s}
.fee-actions button:hover{opacity:.8}
.btn-paid{background:var(--green-bg);color:var(--green-t)}
.btn-partial{background:var(--yellow-bg);color:var(--yellow-t)}
.btn-unpaid{background:var(--red-bg);color:var(--red-t)}
.btn-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px}
.btn-del:hover{color:var(--red)}

/* PARTIAL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--surface);border-radius:16px;padding:1.5rem;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:4px}
.modal p{font-size:13px;color:var(--sec);margin-bottom:1rem}
.modal input{margin-bottom:1rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.hidden{display:none}

/* SUMMARY */
.summary-month-head{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sum-month-title{font-size:16px;font-weight:700}
.sum-detail{display:flex;gap:16px;flex-wrap:wrap}
.sum-item{font-size:13px;color:var(--sec)}
.sum-item span{font-weight:700;color:var(--text)}
.history-list{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.history-month{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.history-month-head{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.history-month-head:hover{background:var(--surface2)}
.history-month-head h3{font-size:15px;font-weight:700}
.history-month-body{padding:0 1.25rem 1rem;display:none;border-top:1px solid var(--border)}
.history-month-body.open{display:block}
.h-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:.5px solid var(--border);font-size:13px;flex-wrap:wrap;gap:6px}
.h-row:last-child{border-bottom:none}
.h-name{font-weight:600}
.h-meta{color:var(--sec);font-size:12px}

.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px}
.panel{display:none}
.panel.active{display:block}

.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent-t)}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .fg-4{grid-template-columns:1fr 1fr}
  .fg-4 .field:last-child{grid-column:span 2}
  .s-card{grid-template-columns:36px 1fr auto}
  .s-card .s-fee-col{display:none}
  .fee-card{grid-template-columns:36px 1fr}
  .fee-card .fee-actions{grid-column:span 2}
}
</style>
</head>
<body>
<!-- LOCK SCREEN -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h2>Tuition Manager</h2>
    <p>Enter your password to access</p>
    <input type="password" id="lock-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()"/>
    <button onclick="unlock()">Unlock</button>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-footer">Private — authorized access only</div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>📚 Tuition Manager</h1>
      <p>Manage students, fees & monthly records</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="month-selector">
        <button onclick="prevMonth()">◀</button>
        <select id="month-select" onchange="onMonthChange()"></select>
        <button onclick="nextMonth()">▶</button>
      </div>
      <button onclick="logout()" style="padding:7px 14px;border:1px solid #e2e2de;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:#6b6b68">🔒 Lock</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="switchTab('fees')">Monthly Fees</button>
    <button class="tab" onclick="switchTab('students')">Students</button>
    <button class="tab" onclick="switchTab('summary')">Summary</button>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="panel active">
    <div class="stats" id="dash-stats"></div>
    <div class="sec-head"><h2 id="dash-title">This month overview</h2></div>
    <div class="list" id="dash-list"></div>
  </div>

  <!-- MONTHLY FEES -->
  <div id="tab-fees" class="panel">
    <div class="sec-head">
      <h2 id="fees-title">Fee records</h2>
      <div class="filter-row">
        <select id="fee-class-filter" onchange="renderFees()">
          <option value="all">All classes</option>
          <option value="8">Class 8</option>
          <option value="9">Class 9</option>
          <option value="10">Class 10</option>
        </select>
        <select id="fee-status-filter" onchange="renderFees()">
          <option value="all">All status</option>
          <option value="paid">Paid</option>
          <option value="partial">Partial</option>
          <option value="unpaid">Unpaid</option>
        </select>
      </div>
    </div>
    <div class="stats" id="fee-stats"></div>
    <div class="list" id="fee-list"></div>
  </div>

  <!-- STUDENTS -->
  <div id="tab-students" class="panel">
    <div class="form-box">
      <div class="form-title">Add new student</div>
      <div class="fg fg-4">
        <div class="field"><label>Full name</label><input id="s-name" placeholder="e.g. Rahul Sharma"/></div>
        <div class="field"><label>Class</label>
          <select id="s-class">
            <option value="8">Class 8</option>
            <option value="9">Class 9</option>
            <option value="10">Class 10</option>
          </select>
        </div>
        <div class="field"><label>Monthly fee (₹)</label><input id="s-fee" type="number" placeholder="1500"/></div>
        <div class="field"><label>&nbsp;</label><button class="btn btn-blue" onclick="addStudent()">Add student</button></div>
      </div>
    </div>
    <div class="sec-head">
      <h2>All students</h2>
      <div class="filter-row">
        <select id="s-class-filter" onchange="renderStudents()">
          <option value="all">All classes</option>
          <option value="8">Class 8</option>
          <option value="9">Class 9</option>
          <option value="10">Class 10</option>
        </select>
        <input id="s-search" placeholder="Search name..." oninput="renderStudents()" style="width:140px"/>
      </div>
    </div>
    <div class="list" id="student-list"></div>
  </div>

  <!-- SUMMARY -->
  <div id="tab-summary" class="panel">
    <div class="sec-head"><h2>Month-wise summary</h2></div>
    <div id="summary-content"></div>
  </div>

</div>

<!-- PARTIAL PAYMENT MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <h3>Partial payment</h3>
    <p id="modal-student-name">Enter amount received</p>
    <input type="number" id="modal-amount" placeholder="Enter amount received (₹)"/>
    <div class="modal-btns">
      <button class="btn btn-red btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-blue btn-sm" onclick="confirmPartial()">Save</button>
    </div>
  </div>
</div>

<script>
// ── PASSWORD LOCK ─────────────────────────────────────────────────────────────
const PASS = 'azam1993';
function unlock() {
  const val = document.getElementById('lock-input').value;
  if(val === PASS) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    try { sessionStorage.setItem('tm_auth','1'); } catch(e){}
  } else {
    const err = document.getElementById('lock-error');
    err.textContent = 'Wrong password. Please try again.';
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
    setTimeout(()=>{ err.textContent=''; }, 3000);
  }
}
// Auto-unlock if already authenticated this session
(function(){
  try {
    if(sessionStorage.getItem('tm_auth')==='1'){
      document.getElementById('lock-screen').style.display='none';
      document.getElementById('main-app').style.display='block';
    }
  } catch(e){}
})();

// ── DATA ──────────────────────────────────────────────────────────────────────
let students = [];
let feeRecords = {}; // { "2025-07": { studentId: { status, paid } } }
let currentMonth = "";
let modalStudentId = null;

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function load() {
  try {
    students = JSON.parse(localStorage.getItem('tm2_students') || '[]');
    feeRecords = JSON.parse(localStorage.getItem('tm2_fees') || '{}');
  } catch(e) {}
}
function save() {
  try {
    localStorage.setItem('tm2_students', JSON.stringify(students));
    localStorage.setItem('tm2_fees', JSON.stringify(feeRecords));
  } catch(e) {}
}

// ── MONTH HELPERS ─────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function keyToLabel(key) {
  const [y,m] = key.split('-');
  return MONTHS[parseInt(m)-1] + ' ' + y;
}
function prevKey(key) {
  let [y,m] = key.split('-').map(Number);
  m--; if(m<1){m=12;y--;}
  return y+'-'+String(m).padStart(2,'0');
}
function nextKey(key) {
  let [y,m] = key.split('-').map(Number);
  m++; if(m>12){m=1;y++;}
  return y+'-'+String(m).padStart(2,'0');
}
function buildMonthSelect() {
  const sel = document.getElementById('month-select');
  sel.innerHTML = '';
  // show last 12 months + current
  let key = todayKey();
  const keys = [];
  for(let i=0;i<13;i++){
    keys.unshift(key);
    key = prevKey(key);
  }
  keys.forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = keyToLabel(k);
    sel.appendChild(o);
  });
  sel.value = currentMonth;
}
function prevMonth() {
  currentMonth = prevKey(currentMonth);
  document.getElementById('month-select').value = currentMonth;
  ensureMonthRecords(currentMonth);
  refreshAll();
}
function nextMonth() {
  const nxt = nextKey(currentMonth);
  const today = todayKey();
  if(nxt > today) return;
  currentMonth = nxt;
  document.getElementById('month-select').value = currentMonth;
  ensureMonthRecords(currentMonth);
  refreshAll();
}
function onMonthChange() {
  currentMonth = document.getElementById('month-select').value;
  ensureMonthRecords(currentMonth);
  refreshAll();
}

// ── FEE RECORDS ───────────────────────────────────────────────────────────────
function ensureMonthRecords(key) {
  if(!feeRecords[key]) feeRecords[key] = {};
  students.forEach(s => {
    if(!feeRecords[key][s.id]) {
      feeRecords[key][s.id] = { status:'unpaid', paid:0 };
    }
  });
  save();
}
function getRecord(month, sid) {
  if(!feeRecords[month]) return { status:'unpaid', paid:0 };
  return feeRecords[month][sid] || { status:'unpaid', paid:0 };
}
function setRecord(month, sid, status, paid) {
  if(!feeRecords[month]) feeRecords[month] = {};
  feeRecords[month][sid] = { status, paid };
  save();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function ini(name){ return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmt(n){ return '₹'+Number(n).toLocaleString('en-IN'); }
function classLabel(c){ return 'Class '+c; }
function monthStats(key) {
  let collected=0, pending=0, paidCount=0, unpaidCount=0, partialCount=0;
  students.forEach(s => {
    const r = getRecord(key, s.id);
    collected += r.paid;
    if(r.status==='paid') { paidCount++; }
    else if(r.status==='partial') { partialCount++; pending += s.fee - r.paid; }
    else { unpaidCount++; pending += s.fee; }
  });
  return { collected, pending, paidCount, unpaidCount, partialCount, total: students.length };
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','fees','students','summary'][i]===t);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='summary') renderSummary();
  if(t==='dashboard') renderDashboard();
  if(t==='fees') renderFees();
  if(t==='students') renderStudents();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const st = monthStats(currentMonth);
  document.getElementById('dash-title').textContent = keyToLabel(currentMonth) + ' — Overview';
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat"><div class="stat-val g">${fmt(st.collected)}</div><div class="stat-lbl">Collected</div></div>
    <div class="stat"><div class="stat-val r">${fmt(st.pending)}</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-val g">${st.paidCount}</div><div class="stat-lbl">Paid</div></div>
    <div class="stat"><div class="stat-val r">${st.unpaidCount + st.partialCount}</div><div class="stat-lbl">Not fully paid</div></div>
  `;
  const unpaid = students.filter(s => {
    const r = getRecord(currentMonth, s.id);
    return r.status !== 'paid';
  });
  const el = document.getElementById('dash-list');
  if(!students.length){ el.innerHTML='<div class="empty">No students yet. Go to Students tab to add.</div>'; return; }
  if(!unpaid.length){ el.innerHTML='<div class="empty" style="color:var(--green)">🎉 All students have paid for '+keyToLabel(currentMonth)+'!</div>'; return; }
