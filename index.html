<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tuition Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f1;--surface:#fff;--surface2:#f9f9f7;--border:#e2e2de;
  --text:#1a1a18;--sec:#6b6b68;--muted:#a0a09e;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-t:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-t:#15803d;
  --red:#dc2626;--red-bg:#fef2f2;--red-t:#b91c1c;
  --yellow-bg:#fffbeb;--yellow-t:#b45309;
  --r:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 5rem}

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>📚 Tuition Manager</h1>
      <p>Manage students, fees & monthly records</p>
    </div>
    <div class="month-selector">
      <button onclick="prevMonth()">◀</button>
      <select id="month-select" onchange="onMonthChange()"></select>
      <button onclick="nextMonth()">▶</button>
    </div>
  el.innerHTML = '<p style="font-size:13px;color:var(--sec);margin-bottom:8px;font-weight:600">PENDING PAYMENTS</p>' +
    unpaid.map(s => {
      const r = getRecord(currentMonth, s.id);
      const due = s.fee - r.paid;
      return `<div class="fee-card">
        <div class="avatar">${ini(s.name)}</div>
        <div>
          <div class="s-name">${s.name}</div>
          <div class="s-meta">${classLabel(s.class)} · Fee: ${fmt(s.fee)}${r.status==='partial'?' · Paid: '+fmt(r.paid):''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:700;color:var(--red)">${fmt(due)}</div>
          <div style="font-size:11px;color:var(--muted)">${r.status==='partial'?'partial':'pending'}</div>
        </div>
        <div class="fee-actions">
          <button class="btn-paid" onclick="markStatus('${s.id}','paid',${s.fee})">Mark paid</button>
        </div>
      </div>`;
    }).join('');
}

// ── MONTHLY FEES ──────────────────────────────────────────────────────────────
function renderFees() {
  const cf = document.getElementById('fee-class-filter').value;
  const sf = document.getElementById('fee-status-filter').value;
  document.getElementById('fees-title').textContent = keyToLabel(currentMonth) + ' — Fee Records';

  const st = monthStats(currentMonth);
  document.getElementById('fee-stats').innerHTML = `
    <div class="stat"><div class="stat-val g">${fmt(st.collected)}</div><div class="stat-lbl">Collected</div></div>
    <div class="stat"><div class="stat-val r">${fmt(st.pending)}</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-val g">${st.paidCount}</div><div class="stat-lbl">Paid</div></div>
    <div class="stat"><div class="stat-val r">${st.unpaidCount}</div><div class="stat-lbl">Unpaid</div></div>
  `;

  let list = students;
  if(cf !== 'all') list = list.filter(s => String(s.class) === cf);
  if(sf !== 'all') list = list.filter(s => getRecord(currentMonth, s.id).status === sf);

  const el = document.getElementById('fee-list');
  if(!list.length){ el.innerHTML='<div class="empty">No records found.</div>'; return; }

  el.innerHTML = list.map(s => {
    const r = getRecord(currentMonth, s.id);
    const due = s.fee - r.paid;
    return `<div class="fee-card">
      <div class="avatar">${ini(s.name)}</div>
      <div>
        <div class="s-name">${s.name} <span class="chip">${classLabel(s.class)}</span></div>
        <div class="s-meta">Fee: ${fmt(s.fee)}${r.status==='partial'?' · Received: '+fmt(r.paid)+' · Due: '+fmt(due):r.status==='paid'?' · Fully paid':' · Due: '+fmt(s.fee)}</div>
      </div>
      <div><span class="badge ${r.status}">${r.status}</span></div>
      <div class="fee-actions">
        ${r.status!=='paid'?`<button class="btn-paid" onclick="markStatus('${s.id}','paid',${s.fee})">Paid</button>`:''}
        ${r.status!=='partial'?`<button class="btn-partial" onclick="openModal('${s.id}')">Partial</button>`:''}
        ${r.status!=='unpaid'?`<button class="btn-unpaid" onclick="markStatus('${s.id}','unpaid',0)">Unpaid</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function markStatus(sid, status, paid) {
  setRecord(currentMonth, sid, status, paid);
  refreshAll();
}

// ── PARTIAL MODAL ─────────────────────────────────────────────────────────────
function openModal(sid) {
  modalStudentId = sid;
  const s = students.find(x => x.id == sid);
  document.getElementById('modal-student-name').textContent =
    s ? s.name + ' — Full fee: ' + fmt(s.fee) : 'Enter amount received';
  document.getElementById('modal-amount').value = '';
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-amount').focus();
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  modalStudentId = null;
}
function confirmPartial() {
  const amt = parseInt(document.getElementById('modal-amount').value) || 0;
  if(!amt || amt <= 0){ alert('Please enter a valid amount.'); return; }
  const s = students.find(x => x.id == modalStudentId);
  if(s && amt >= s.fee){ markStatus(modalStudentId, 'paid', s.fee); }
  else { markStatus(modalStudentId, 'partial', amt); }
  closeModal();
}
document.getElementById('modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// ── STUDENTS ──────────────────────────────────────────────────────────────────
function renderStudents() {
  const cf = document.getElementById('s-class-filter').value;
  const q  = document.getElementById('s-search').value.toLowerCase();
  let list = students;
  if(cf !== 'all') list = list.filter(s => String(s.class) === cf);
  if(q) list = list.filter(s => s.name.toLowerCase().includes(q));

  const el = document.getElementById('student-list');
  if(!list.length){ el.innerHTML='<div class="empty">No students found.</div>'; return; }

  el.innerHTML = list.map(s => {
    const r = getRecord(currentMonth, s.id);
    return `<div class="s-card">
      <div class="avatar">${ini(s.name)}</div>
      <div>
        <div class="s-name">${s.name}</div>
        <div class="s-meta">${classLabel(s.class)} · ${fmt(s.fee)}/month</div>
      </div>
      <div class="s-fee-col" style="text-align:right">
        <div class="s-fee">${fmt(s.fee)}</div>
        <div class="s-fee-lbl">per month</div>
      </div>
      <div><span class="badge ${r.status}">${r.status} (${keyToLabel(currentMonth).split(' ')[0]})</span></div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)" onclick="editFee('${s.id}')">Edit fee</button>
        <button class="btn-del" onclick="deleteStudent('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function addStudent() {
  const name = document.getElementById('s-name').value.trim();
  const cls  = document.getElementById('s-class').value;
  const fee  = parseInt(document.getElementById('s-fee').value) || 0;
  if(!name || !fee){ alert('Please enter name and fee amount.'); return; }
  const id = 's' + Date.now();
  students.push({ id, name, class: cls, fee });
  // init record for current month
  if(!feeRecords[currentMonth]) feeRecords[currentMonth] = {};
  feeRecords[currentMonth][id] = { status:'unpaid', paid:0 };
  save();
  document.getElementById('s-name').value = '';
  document.getElementById('s-fee').value  = '';
  renderStudents();
  renderDashboard();
}

function deleteStudent(sid) {
  const s = students.find(x => x.id === sid);
  if(!confirm('Remove ' + (s?s.name:'this student') + '? This will delete all their fee records too.')) return;
  students = students.filter(x => x.id !== sid);
  Object.keys(feeRecords).forEach(k => { delete feeRecords[k][sid]; });
  save(); renderStudents(); renderDashboard();
}

function editFee(sid) {
  const s = students.find(x => x.id === sid);
  if(!s) return;
  const newFee = prompt('Update monthly fee for ' + s.name + ' (current: ₹' + s.fee + '):', s.fee);
  if(newFee === null) return;
  const f = parseInt(newFee);
  if(!f || f <= 0){ alert('Invalid fee amount.'); return; }
  s.fee = f;
  save(); renderStudents();
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const months = Object.keys(feeRecords).sort().reverse();
  const el = document.getElementById('summary-content');
  if(!months.length){ el.innerHTML='<div class="empty">No records yet.</div>'; return; }

  el.innerHTML = months.map(key => {
    const st = monthStats(key);
    const rows = students.map(s => {
      const r = getRecord(key, s.id);
      const due = s.fee - r.paid;
      return `<div class="h-row">
        <div>
          <div class="h-name">${s.name} <span class="chip">${classLabel(s.class)}</span></div>
          <div class="h-meta">Fee: ${fmt(s.fee)}${r.status==='partial'?' · Paid: '+fmt(r.paid)+' · Due: '+fmt(due):''}</div>
        </div>
        <span class="badge ${r.status}">${r.status}</span>
      </div>`;
    }).join('');

    return `<div class="history-month">
      <div class="history-month-head" onclick="toggleHistory(this)">
        <h3>${keyToLabel(key)}</h3>
        <div class="sum-detail">
          <div class="sum-item">Collected: <span style="color:var(--green)">${fmt(st.collected)}</span></div>
          <div class="sum-item">Pending: <span style="color:var(--red)">${fmt(st.pending)}</span></div>
          <div class="sum-item">Paid: <span>${st.paidCount}/${st.total}</span></div>
          <span style="font-size:18px;color:var(--muted)">▾</span>
        </div>
      </div>
      <div class="history-month-body">${rows || '<div class="empty">No students.</div>'}</div>
    </div>`;
  }).join('');
}

function toggleHistory(head) {
  const body = head.nextElementSibling;
  body.classList.toggle('open');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function refreshAll() {
  const activeTab = [...document.querySelectorAll('.tab')].find(t=>t.classList.contains('active'));
  const tabName = activeTab ? ['dashboard','fees','students','summary'][
    [...document.querySelectorAll('.tab')].indexOf(activeTab)] : 'dashboard';
  if(tabName==='dashboard') renderDashboard();
  if(tabName==='fees') renderFees();
  if(tabName==='students') renderStudents();
  if(tabName==='summary') renderSummary();
}

load();
currentMonth = todayKey();
ensureMonthRecords(currentMonth);
buildMonthSelect();
renderDashboard();
</script>
</body>
</html>
